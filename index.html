<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QuadTree Benchmark</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>

        <h1>QuadTree vs Fuerza Bruta</h1>

    </header>

    <main>

        <section id="controls">

            <div class="control">

                <label>Partículas</label>

                <input
                    id="particles"
                    type="range"
                    min="100"
                    max="10000"
                    step="100"
                    value="1000">

            </div>

            <div class="control">

                <label>Radio</label>

                <input
                    id="radius"
                    type="range"
                    min="2"
                    max="12"
                    value="4">

            </div>

            <div class="control">

                <label>Velocidad</label>

                <input
                    id="speed"
                    type="range"
                    min="1"
                    max="5"
                    step="0.5"
                    value="1.5">

            </div>

            <div class="control">

                <label>Capacidad</label>

                <input
                    id="capacity"
                    type="range"
                    min="2"
                    max="16"
                    value="4">

            </div>

            <div class="control">

                <label>Distribución</label>

                <select id="distribution">

                    <option value="uniform">Uniforme</option>

                    <option value="cluster">Cluster</option>

                    <option value="dense">Densa</option>

                </select>

            </div>

            <button id="resetButton">

                Reiniciar

            </button>

            <button onclick="runBenchmark()">

                Ejecutar Benchmark

            </button>

        </section>

        <section id="simulation">

            <canvas
                id="cv"
                width="1200"
                height="700">

            </canvas>

        </section>

    </main>

    <script type="module" src="main.js"></script>

</body>

</html>
